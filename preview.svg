<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="robloxfpsboosterpvBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="robloxfpsboosterpvAc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2231a"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="robloxfpsboosterpvCg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="robloxfpsboosterpvGl">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="robloxfpsboosterpvSh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <pattern id="robloxfpsboostergrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#robloxfpsboosterpvBg)"/>
  <rect width="1280" height="640" fill="url(#robloxfpsboostergrid)" opacity="0.45"/>
  <ellipse cx="200" cy="320" rx="280" ry="200" fill="#e2231a" opacity="0.05"/>
  <ellipse cx="1080" cy="320" rx="280" ry="200" fill="#ff6b6b" opacity="0.05"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#robloxfpsboosterpvAc)"/>
  <rect x="0" y="636" width="1280" height="4" fill="url(#robloxfpsboosterpvAc)"/>
  <rect x="80" y="80" width="3" height="480" fill="url(#robloxfpsboosterpvAc)" opacity="0.6"/>


  <g transform="translate(112,220)" filter="url(#robloxfpsboosterpvSh)">
    <rect x="4" y="4" width="52" height="52" rx="8" fill="#e2231a" transform="rotate(-14 30 30)"/>
    <rect x="14" y="14" width="32" height="32" rx="5" fill="#ff6b6b" transform="rotate(-14 30 30)"/>
  </g>
  <g transform="translate(112,300)" filter="url(#robloxfpsboosterpvSh)">
    <rect x="0" y="0" width="60" height="60" fill="#21262d" rx="8" stroke="#30363d"/>
    <rect x="10" y="38" width="8" height="14" rx="2" fill="#e2231a"/>
    <rect x="22" y="30" width="8" height="22" rx="2" fill="#ff6b6b"/>
    <rect x="34" y="22" width="8" height="30" rx="2" fill="#e2231a"/>
    <rect x="46" y="14" width="8" height="38" rx="2" fill="#ff6b6b"/>
  </g>

  <text x="220" y="280" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="700" letter-spacing="-2" fill="#ffffff" filter="url(#robloxfpsboosterpvGl)">Roblox</text>
  <text x="220" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="700" letter-spacing="-2" fill="url(#robloxfpsboosterpvAc)" filter="url(#robloxfpsboosterpvGl)">FPS Booster</text>
  <text x="222" y="420" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#8b949e" letter-spacing="0.3">Lightweight Windows tool to reduce stutter and unlock smoother Roblox performance</text>
  <line x1="220" y1="445" x2="900" y2="445" stroke="#30363d" stroke-width="1"/>

  <g transform="translate(222,465)">
    <rect x="0" y="0" width="170" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2231a" font-weight="600">Windows Only</text>
  </g>
  <g transform="translate(406,465)">
    <rect x="0" y="0" width="150" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2231a" font-weight="600">MIT License</text>
  </g>
  <g transform="translate(570,465)">
    <rect x="0" y="0" width="180" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ff6b6b" font-weight="600">Auto-Update CI</text>
  </g>
  <g transform="translate(764,465)">
    <rect x="0" y="0" width="160" height="36" fill="#21262d" rx="18" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#f78166" font-weight="600">Open Source</text>
  </g>

  <g transform="translate(950, 120)" filter="url(#robloxfpsboosterpvSh)">
    <rect x="0" y="0" width="260" height="400" fill="url(#robloxfpsboosterpvCg)" rx="12" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="36" fill="#21262d" rx="12"/>
    <rect x="0" y="24" width="260" height="12" fill="#21262d"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    <text x="130" y="23" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#8b949e">boost.ps1</text>
    <text x="16" y="68" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#e2231a" font-weight="bold">$ .\boost.ps1</text>
    <text x="16" y="88" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#8b949e">[INFO] Detecting Roblox Player...</text>
    <text x="16" y="108" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#e2231a">[OK]   Process found</text>
    <text x="16" y="128" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#8b949e">[INFO] Raising CPU priority...</text>
    <rect x="16" y="142" width="228" height="8" fill="#30363d" rx="4"/>
    <rect x="16" y="142" width="200" height="8" fill="url(#robloxfpsboosterpvAc)" rx="4"/>
    <text x="16" y="166" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#e2231a">[OK]   Priority set to High</text>
    <text x="16" y="186" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#e2231a">[OK]   1.2 GB recovered</text>
    <text x="16" y="206" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#484f58">----------------------------</text>
    <text x="16" y="226" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#ffffff" font-weight="bold">Boost complete! Stutter -35%</text>
    <text x="16" y="248" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#8b949e">Launch Roblox when ready.</text>
    <rect x="16" y="276" width="10" height="16" fill="#e2231a" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="640" y="610" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#30363d" letter-spacing="1">github.com / roblox-fps-booster</text>
</svg>
